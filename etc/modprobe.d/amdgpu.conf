# ============================================================================
# AMD GPU Driver Module Parameters
# ============================================================================

# AMD GPU Feature Enablement
#
# ppfeaturemask=0xffffffff
#   - Enable ALL power management and performance features
#   - Allows full dynamic power state transitions
#   - Essential for laptop battery life and desktop efficiency
#
options amdgpu ppfeaturemask=0xffffffff

# Optional: GPU memory overclock (advanced, use with caution)
# Uncomment only if you know what you're doing
# options amdgpu sclk=7 mclk=3 voltage_overdrive=10
