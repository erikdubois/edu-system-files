# ============================================================================
# Realtek Ethernet Driver Parameters
# ============================================================================

# R8169 Driver (Realtek Gigabit)
# Common on consumer boards and laptops
# These improve stability and power efficiency:
#   - Firmware priority prevents driver issues
#   - Selective ACK aggregation reduces CPU usage
#   - ASPM helps power management
#
options r8169 \
    use_dac=1 \
    speed_mode=0 \
    rtl_fw_select_priority=0 \
    transmit_dma=0 \
    max_interrupt_work=0 \
    sc_param=0

# Optional: For power-saving on battery
# options r8169 eee_enable=1 aspm_enable=1
