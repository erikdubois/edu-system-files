#!/bin/bash

# Exit on error, undefined variables, and pipe failures
set -Euo pipefail

# Source common library
if [[ -f /usr/local/lib/kiro-common.sh ]]; then
    source /usr/local/lib/kiro-common.sh
else
    echo "ERROR: kiro-common.sh not found" >&2
    exit 1
fi

##################################################################################################################
# Author 	: Erik Dubois
# Website   : https://www.erikdubois.be
# Website	: https://www.arcolinux.info
# Website	: https://www.arcolinux.com
# Website	: https://www.arcolinuxd.com
# Website	: https://www.arcolinuxb.com
# Website	: https://www.arcolinuxiso.com
# Website	: https://www.arcolinuxforum.com
##################################################################################################################
#
#   DO NOT JUST RUN THIS. EXAMINE AND JUDGE. RUN AT YOUR OWN RISK.
#
##################################################################################################################

# Parse common arguments
parse_common_args "add-chaotic_repo-to-pacman.conf" "1.0.0" \
    "Add the chaotic-aur repository to pacman.conf" \
    "[OPTIONS]" \
    "    (no additional options)"

# Add chaotic-aur repository to /etc/pacman.conf

log_section "Adding chaotic-aur repository to pacman.conf"

# Check if already present
if grep -q "^[[:space:]]*\[chaotic-aur\]" /etc/pacman.conf; then
  log_success "chaotic-aur is already in /etc/pacman.conf"
else
  log_subsection "Appending chaotic-aur repository"
  echo '

[chaotic-aur]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/chaotic-mirrorlist' | sudo tee -a /etc/pacman.conf >/dev/null || {
    log_warn "Failed to append chaotic-aur repository"
    exit 1
  }
  log_success "chaotic-aur repository added"
fi

# Remove all trailing blank lines
log_subsection "Cleaning up trailing blank lines"
sudo sed -i -e ':a' -e '/^[[:space:]]*$/{$d;N;ba' -e '}' /etc/pacman.conf || log_warn "Failed to remove trailing blank lines"


sudo awk '
  BEGIN { skip_blank = 0 }
  {
    if ($0 ~ /^#Server = file:\/\/\/home\/custompkgs$/) {
      print
      skip_blank = 1
      next
    }
    if (skip_blank) {
      if ($0 ~ /^[[:space:]]*$/) {
        if (blank_printed == 0) {
          print ""
          blank_printed = 1
        }
        next
      } else {
        skip_blank = 0
        blank_printed = 0
      }
    }
    print
  }
' /etc/pacman.conf | sudo tee /etc/pacman.conf.tmp > /dev/null && sudo mv /etc/pacman.conf.tmp /etc/pacman.conf

echo "################################################################"
echo "################### done"
echo "################################################################"