#!/bin/bash

# Exit on error, undefined variables, and pipe failures
set -Euo pipefail

# Source common library
if [[ -f /usr/local/lib/kiro-common.sh ]]; then
    source /usr/local/lib/kiro-common.sh
else
    echo "ERROR: kiro-common.sh not found" >&2
    exit 1
fi

##################################################################################################################
# Author    : Erik Dubois
# Website   : https://www.erikdubois.be
# Website   : https://www.arcolinux.info
# Website   : https://www.arcolinux.com
# Website   : https://www.arcolinuxd.com
# Website   : https://www.arcolinuxb.com
# Website   : https://www.arcolinuxiso.com
# Website   : https://www.arcolinuxforum.com
##################################################################################################################
#
#   DO NOT JUST RUN THIS. EXAMINE AND JUDGE. RUN AT YOUR OWN RISK.
#
##################################################################################################################

# Parse common arguments
parse_common_args "add-nemesis_repo-to-pacman.conf" "1.0.0" \
    "Add the nemesis_repo to pacman.conf before chaotic-aur" \
    "[OPTIONS]" \
    "    (no additional options)"

log_section "Adding nemesis_repo to pacman.conf"

# Check if already present
if grep -q "^\[nemesis_repo\]" /etc/pacman.conf; then
    log_success "nemesis_repo already present in pacman.conf"
    exit 0
fi

# Check if chaotic-aur exists to know where to insert
if grep -q "^\[chaotic-aur\]" /etc/pacman.conf; then
    log_subsection "Adding nemesis_repo before chaotic-aur"
    
    if [[ "${DRY_RUN:-false}" == "true" ]]; then
        log_info "[DRY-RUN] Would insert nemesis_repo before chaotic-aur section"
    else
        # Create temporary file for the updated config
        tmpfile=$(mktemp)
        trap "rm -f '${tmpfile}'" EXIT INT TERM
        
        # Build config with nemesis_repo before chaotic-aur
        awk '
            BEGIN { done=0 }
            /^\[chaotic-aur\]/ && !done {
                print ""
                print "[nemesis_repo]"
                print "SigLevel = Never"
                print "Server = https://erikdubois.github.io/$repo/$arch"
                print ""
                done=1
            }
            { print }
        ' /etc/pacman.conf > "${tmpfile}" || {
            log_warn "Failed to build configuration"
            exit 1
        }
        
        sudo cp "${tmpfile}" /etc/pacman.conf || {
            log_warn "Failed to update pacman.conf"
            exit 1
        }
    fi
else
    log_subsection "Adding nemesis_repo at end of pacman.conf"
    
    if [[ "${DRY_RUN:-false}" == "true" ]]; then
        log_info "[DRY-RUN] Would append nemesis_repo to end of pacman.conf"
    else
        printf '\n[nemesis_repo]\nSigLevel = Never\nServer = https://erikdubois.github.io/$repo/$arch\n' | \
        sudo tee -a /etc/pacman.conf >/dev/null || {
            log_warn "Failed to append nemesis_repo"
            exit 1
        }
    fi
fi

log_success "nemesis_repo successfully added to pacman.conf"
