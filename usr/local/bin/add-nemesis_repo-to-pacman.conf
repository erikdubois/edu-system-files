#!/bin/bash

# Exit on error, undefined variables, and pipe failures
set -Euo pipefail

# Source common library
if [[ -f /usr/local/lib/kiro-common.sh ]]; then
    source /usr/local/lib/kiro-common.sh
else
    echo "ERROR: kiro-common.sh not found" >&2
    exit 1
fi

##################################################################################################################
# Author    : Erik Dubois
# Website   : https://www.erikdubois.be
# Website   : https://www.arcolinux.info
# Website   : https://www.arcolinux.com
# Website   : https://www.arcolinuxd.com
# Website   : https://www.arcolinuxb.com
# Website   : https://www.arcolinuxiso.com
# Website   : https://www.arcolinuxforum.com
##################################################################################################################
#
#   DO NOT JUST RUN THIS. EXAMINE AND JUDGE. RUN AT YOUR OWN RISK.
#
##################################################################################################################

log_section "Adding nemesis_repo to pacman.conf"

# Check if already present
if grep -q "^\[nemesis_repo\]" /etc/pacman.conf; then
    log_success "nemesis_repo already present in pacman.conf"
    rm "${tmpfile}" 2>/dev/null || true
    exit 0
fi

log_subsection "Creating temporary configuration file"
local tmpfile
tmpfile=$(mktemp) || {
    log_warn "Failed to create temporary file"
    exit 1
}

trap "rm -f '${tmpfile}'" EXIT INT TERM

cat <<'EOF' > "${tmpfile}" || {
    log_warn "Failed to write temporary file"
    exit 1
}

[nemesis_repo]
SigLevel = Never
Server = https://erikdubois.github.io/$repo/$arch
EOF

log_subsection "Removing any existing nemesis_repo block"
sudo sed -i '/^\s*#*\s*\[nemesis_repo\]/,/^\s*\[.*\]/ { /^[^\[]/d; /^\s*#*\s*\[nemesis_repo\]/d }' /etc/pacman.conf || log_warn "Failed to remove existing nemesis_repo"

# Insert before [chaotic-aur] block if it exists
if grep -q "^\s*\[chaotic-aur\]" /etc/pacman.conf; then
    log_subsection "Inserting nemesis_repo before chaotic-aur"
    sudo awk -v insert="$(cat "${tmpfile}")" '
        BEGIN { done=0 }
        /^\s*\[chaotic-aur\]/ && !done {
            print insert
            print ""
            done=1
        }
        { print }
    ' /etc/pacman.conf | sudo tee /etc/pacman.conf.tmp >/dev/null || {
        log_warn "Failed to insert nemesis_repo"
        exit 1
    }
    sudo mv /etc/pacman.conf.tmp /etc/pacman.conf || {
        log_warn "Failed to update pacman.conf"
        exit 1
    }
else
    log_subsection "Appending nemesis_repo to end of pacman.conf"
    echo "" | sudo tee -a /etc/pacman.conf >/dev/null || log_warn "Failed to add newline"
    sudo tee -a /etc/pacman.conf < "${tmpfile}" >/dev/null || {
        log_warn "Failed to append nemesis_repo"
        exit 1
    }
fi

log_success "nemesis_repo successfully added to pacman.conf"
echo "######## nemesis_repo added before full chaotic-aur block"
echo "################################################################"

# Remove all trailing blank lines
sudo sed -i -e ':a' -e '/^[[:space:]]*$/{$d;N;ba' -e '}' /etc/pacman.conf


sudo awk '
  BEGIN { skip_blank = 0 }
  {
    if ($0 ~ /^#Server = file:\/\/\/home\/custompkgs$/) {
      print
      skip_blank = 1
      next
    }
    if (skip_blank) {
      if ($0 ~ /^[[:space:]]*$/) {
        if (blank_printed == 0) {
          print ""
          blank_printed = 1
        }
        next
      } else {
        skip_blank = 0
        blank_printed = 0
      }
    }
    print
  }
' /etc/pacman.conf | sudo tee /etc/pacman.conf.tmp > /dev/null && sudo mv /etc/pacman.conf.tmp /etc/pacman.conf


echo "################################################################"
echo "################### done"
echo "################################################################"
